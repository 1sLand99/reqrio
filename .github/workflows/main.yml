name: github
#git commit -m "修复bug [skip actions]"
#git commit -m "更新功能 [skip ci]"
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build
        run: cargo build --package reqrio --release --features export
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9.7"
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}/master/reqrio-py" >> $GITHUB_ENV
      - name: Run Python FFI Test
        run: python tests-ffi/python_test.py
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install Node deps
        run: |
          npm init -y
          npm install ffi-napi
          npm install ref-napi

      - name: Run Node FFI Test
        run: node tests-ffi/node_test.js
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: build
        run: cargo build --package reqrio --release --features export