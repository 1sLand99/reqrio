[workspace]
resolver = "1"
members = [
    "reqrio"
]

[workspace.dependencies]
serde = { version = "1.0.228", features = ["derive"] }
reqrio-json = { path = "json", version = "0.1.7" }
reqtls = { path = "reqtls", version = "0.1.0" }

[profile.release]
opt-level = 3
strip = "symbols"
lto = true
codegen-units = 1
panic = "abort"