[package]
name = "reqrio"
version = "0.0.19"
edition = "2024"
readme = "README.md"
description = "A http lib"
license-file = "../LICENSE-APACHE"
repository = "https://github.com/xllgl2017/reqrio/tree/master/reqrio"

[lib]
name = "reqrio"
crate-type = ['rlib', 'cdylib']

[dependencies]
reqrio-json = { workspace = true }
brotli = "8.0.2"
flate2 = "1.1.8"
zstd = "0.13.3"
httlib-hpack = "0.1.3"
#httlib-huffman = "0.3.4"
urlencoding = "2.1.3"
serde = { workspace = true, optional = true }
tokio = { version = "1.49.0", features = ["time", "net", "io-util", "macros", 'rt-multi-thread'], optional = true }
reqtls = { workspace = true }

[features]
fpr = []
aync = ["tokio"]
export = []

[build-dependencies]
cfg_aliases = "0.2.1"

